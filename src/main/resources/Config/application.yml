eureka:
  client:
    serviceUrl:
      #  Docker  → defaultZone: http://eureka-server:8761/eureka
      # Local   → defaultZone: http://localhost:8761/eureka
      defaultZone: http://localhost:8761/eureka
springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    csrf:
      enabled: true
